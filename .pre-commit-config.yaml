repos:
  - repo: local
    hooks:
      - id: go-generate-repo
        name: go generate
        entry: sh
        args:
          - -c
          - GOEXPERIMENT=jsonv2 go generate ./...
        language: system
        types: [go]
        pass_filenames: false
        always_run: true

  - repo: https://github.com/tekwizely/pre-commit-golang
    rev: v1.0.0-rc.4
    hooks:
      - id: go-mod-tidy-repo
      - id: go-test-repo-mod
        args: [--hook:env:CGO_ENABLED=0, -race, -count=1, -test.short]
      - id: go-vet-repo-mod
        args: [--hook:env:CGO_ENABLED=0]
      - id: go-fumpt-repo
        args: [-l, -w]
      - id: golangci-lint-repo-mod
        args: [--hook:env:CGO_ENABLED=0, --config, .golangci.yaml, --, --fix]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.1
    hooks:
      - id: markdownlint-cli2
