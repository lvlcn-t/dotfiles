start-at-login = true
on-focus-changed = ['move-mouse window-lazy-center']

# Start apps on launch (AeroSpace's exec-once equivalent)
# Note: macOS usually handles autostart via "Login Items" in System Settings, 
# but you can launch apps via AeroSpace on startup like this:
after-startup-command = [
    'exec-and-forget open -a Ghostty',
    'exec-and-forget open -a "Brave Browser"'
]

# Gaps equivalent (gaps_in = 5, gaps_out = 10)
[gaps]
inner.horizontal = 5
inner.vertical =   5
outer.left =       10
outer.bottom =     10
outer.top =        10
outer.right =      10

# Look and feel equivalents
[mode.main.binding]
# Main modifier bindings (Super -> Alt/Option)
alt-enter = 'exec-and-forget open -a Ghostty'
alt-b = 'exec-and-forget open -a "Brave Browser"'
alt-e = 'exec-and-forget open -a Finder'   # Nautilus equivalent
alt-v = 'exec-and-forget open -a Maccy'    # Clipse equivalent
alt-d = 'exec-and-forget open -a Spotlight'

# Window management
alt-q = 'close'
alt-f = 'fullscreen'
alt-shift-e = 'exec-and-forget pkill AeroSpace' # Exit AeroSpace

# Focus (Arrow keys)
alt-left = 'focus left'
alt-right = 'focus right'
alt-up = 'focus up'
alt-down = 'focus down'

# Focus (Vim keys)
alt-h = 'focus left'
alt-l = 'focus right'
alt-k = 'focus up'
alt-j = 'focus down'

# Switch workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'
alt-0 = 'workspace 10'

# Move window to workspace
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']
alt-shift-0 = ['move-node-to-workspace 10', 'workspace 10']

# ==========================================
# Window Rules (Assigning apps to workspaces)
# ==========================================

# Terminal to Workspace 1
[[on-window-detected]]
if.app-name-regex-substring = 'Ghostty'
run = 'move-node-to-workspace 1'

# Browser to Workspace 2
[[on-window-detected]]
if.app-name-regex-substring = 'Brave'
run = 'move-node-to-workspace 2'

# Spotify to Workspace 3
[[on-window-detected]]
if.app-name-regex-substring = 'Microsoft Teams'
run = 'move-node-to-workspace 3'

# Keep standard Mac popups and specific apps floating
[[on-window-detected]]
if.app-name-regex-substring = 'Maccy|Raycast|System Settings|Finder'
run = 'layout floating'

